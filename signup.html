<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="signup.css"
    />
    <title>Sign Up - College Quest</title>
  </head>
  <body class="signup-body">
    <div class="signup-container">
      <h2>Sign Up</h2>
      <form>
        <input
          type="text"
          placeholder="Full Name"
          required
        />
        <input
          type="email"
          placeholder="Email"
          required
        />
        <input
          type="password"
          placeholder="Password"
          required
        />
        <label for="show-password">
          <input
            type="checkbox"
            id="show-password"
          />
          Show Password
        </label>
        <button type="submit">Sign Up</button>
      </form>
      <p class="login-link">
        Already have an account? <a href="login.html">Log In</a>
      </p>
    </div>
  </body>
</html>
