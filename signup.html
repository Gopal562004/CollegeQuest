<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="signup.css"
    />

    <script src="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.js"></script>
    <link
      type="text/css"
      rel="stylesheet"
      href="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.css"
    />
    <title>Sign Up - College Quest</title>
  </head>
  <body class="signup-body">
    <div class="signup-container">
      <h2>Sign Up</h2>
      <form onsubmit="signup(event)">
        <input
          id="username"
          type="text"
          placeholder="Username"
          required
        />
        <input
          id="email"
          type="email"
          placeholder="Email"
          required
        />
        <input
          id="password"
          type="password"
          placeholder="Password"
          required
        />
        <label for="show-password">
          <input
            type="checkbox"
            id="show-password"
          />
          Show Password
        </label>
        <button
          type="submit"
          id="submit"
          value="submit"
        >
          Sign Up
        </button>
      </form>
      <p class="login-link">
        Already have an account? <a href="login.html">Log In</a>
      </p>
    </div>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-app.js";
      import {
        getDatabase,
        set,
        ref,
      } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-database.js";
      import {
        getAuth,
        createUserWithAndPassword,
      } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA7T7e6DMGrR45fQUabeY9_iEn33Wv2YC8",
        authDomain: "college-quest-396f4.firebaseapp.com",
        databaseURL: "https://college-quest-396f4-default-rtdb.firebaseio.com",
        projectId: "college-quest-396f4",
        storageBucket: "college-quest-396f4.appspot.com",
        messagingSenderId: "204234702502",
        appId: "1:204234702502:web:4c4297f20c33a0a6423e67",
        measurementId: "G-GCWH5P465C",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getDatabase();
      const auth = getAuth(app);

      let RegisterUser = (evt) => {
        evt.preventDefaut();
        createUserWithAndPassword(auth, email.value, password.value)
          .then((Credential) => {
            console.log(Credential);
          })
          .catch((error) => {
            alert(error.code);
            console.log(error.code);
            console.log(error.message);
          })
      }
      MainForm.addEventListener('submit',RegisterUser);
    </script>
  </body>
</html>
